apiVersion: apps/v1
kind: Deployment
metadata:
  name: flask-app-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flask-app
  template:
    metadata:
      labels:
        app: flask-app
    spec:
      containers:
      - name: flask-app
        # C'est ce mot exact 'IMAGE_TAG' que le pipeline va remplacer
        image: khaliiiiid/mon-app-python:IMAGE_TAG
        ports:
        - containerPort: 5000
